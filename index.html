<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Callsign 검색기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #061224;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 16px 48px;
    }

    .card {
      background: #101a31;
      border: 1px solid #22385d;
      border-radius: 24px;
      padding: 22px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      font-weight: 800;
    }

    .sub {
      margin: 0;
      font-size: 16px;
      color: #9fb0cf;
      line-height: 1.6;
    }

    .search-row {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    input {
      flex: 1;
      padding: 18px 18px;
      border-radius: 18px;
      border: 1px solid #2d4d82;
      background: #07152d;
      color: #ffffff;
      font-size: 18px;
      outline: none;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 18px 24px;
      background: #4d8df7;
      color: #ffffff;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .result-title {
      font-size: 14px;
      color: #95a9cc;
      margin-bottom: 16px;
    }

    .result-box {
      min-height: 180px;
      border: 1px solid #22385d;
      border-radius: 22px;
      background: #07152d;
      padding: 24px;
      font-size: 18px;
      line-height: 1.8;
    }

    .label {
      font-size: 14px;
      color: #8fa4ca;
      margin-top: 8px;
    }

    .value {
      font-size: 22px;
      font-weight: 700;
    }

    .route {
      font-size: 28px;
      font-weight: 800;
      margin: 12px 0;
    }

    .error {
      color: #ffb4b4;
      font-weight: 700;
    }

    .muted {
      color: #d7dfef;
    }

    @media (max-width: 640px) {
      .search-row {
        flex-direction: row;
      }

      input {
        min-width: 0;
      }

      button {
        padding: 18px 20px;
      }

      .route {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Callsign 검색기</h1>
      <p class="sub">편명을 입력하면 출발지와 도착지를 찾아준다.</p>
    </section>

    <section class="card">
      <div class="search-row">
        <input id="flightInput" type="text" placeholder="예: 7C1353" />
        <button id="searchBtn" type="button">검색</button>
      </div>
    </section>

    <section class="card">
      <div class="result-title">검색 결과</div>
      <div id="result" class="result-box">
        <div class="muted">편명을 입력하고 검색 버튼을 눌러줘.</div>
      </div>
    </section>
  </main>

  <script>
    const flights = [
      { airline: "제주항공", flight: "7C1353", from: "부산", to: "간사이" },
      { airline: "제주항공", flight: "7C1354", from: "간사이", to: "부산" },
      { airline: "제주항공", flight: "7C8351", from: "부산/김해", to: "상하이/푸동" }
    ];

    function searchFlight() {
      const input = document.getElementById("flightInput");
      const result = document.getElementById("result");
      const keyword = input.value.trim().toUpperCase();

      if (!keyword) {
        result.innerHTML = '<div class="error">편명을 입력해줘.</div>';
        return;
      }

      const found = flights.find(function (item) {
        return String(item.flight).toUpperCase() === keyword;
      });

      if (!found) {
        result.innerHTML = '<div class="error">검색 결과가 없다.</div>';
        return;
      }

      result.innerHTML =
        '<div class="label">항공사</div>' +
        '<div class="value">' + found.airline + '</div>' +
        '<div class="route">' + found.from + ' → ' + found.to + '</div>' +
        '<div class="label">편명</div>' +
        '<div class="value">' + found.flight + '</div>';
    }

    document.getElementById("searchBtn").addEventListener("click", searchFlight);

    document.getElementById("flightInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        searchFlight();
      }
    });
  </script>
</body>
</html>
