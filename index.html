<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Callsign 검색기</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Callsign 검색기</h1>
      <p class="sub">편명을 입력하면 출발지와 도착지를 찾아준다.</p>
    </section>

    <section class="card">
      <div class="search-row">
        <input id="flightInput" type="text" placeholder="예: 7C1353" autocomplete="off" />
        <button id="searchBtn" type="button">검색</button>
      </div>
      <div id="status" class="status muted">데이터 불러오는 중...</div>
    </section>

    <section class="card">
      <div class="result-title">검색 결과</div>
      <div id="result" class="result-box">
        <div class="muted">편명을 입력하고 검색 버튼을 눌러줘.</div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
